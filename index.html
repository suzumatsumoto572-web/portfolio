<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SUZU Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* 1. ページ全体の設定（フォントと文字の余白・間隔） */
  body {
    margin: 0;
    padding: 60px 20px;       /* 上下にしっかり余白をつくる */
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background-color: #fafafa; /* ほんのり優しい明るい背景色 */
    color: #333;
    text-align: center;
  }

  /* 2. タイトルまわりの余白と文字デザイン */
  h1 {
    font-size: 2rem;
    letter-spacing: 0.2em;    /* 文字間隔を広げて洗練された雰囲気に */
    margin-bottom: 8px;
    font-weight: 300;         /* 細めでおしゃれなフォント */
  }

  p {
    font-size: 0.9rem;
    color: #777;
    letter-spacing: 0.15em;
    margin-top: 0;
    margin-bottom: 40px;      /* タイトルとギャラリーの間の余白 */
  }

  /* 3. 横スクロールギャラリーの余白 */
  .gallery {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 24px;                 /* 写真同士の間隔を少し広く */
    padding: 10px 0 50px 0;    /* 下に余白をとる */
    -webkit-overflow-scrolling: touch;
  }

  .gallery::-webkit-scrollbar {
    display: none;             /* スクロールバーを消してすっきり見せる */
  }

  /* 4. 写真の設定 */
  .gallery img {
    flex: 0 0 75%;
    max-width: 480px;
    height: 360px;            /* 高さを揃えて統一感を出す */
    object-fit: cover;         /* 枠に合わせて綺麗にトリミング */
    scroll-snap-align: center;
    border-radius: 8px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .gallery img:hover {
    opacity: 0.9;
    transform: scale(1.01);
  }

  /* 5. フッター（Instagramリンク）のおしゃれなデザイン */
  footer {
    margin-top: 20px;         /* ギャラリーからの余白 */
  }

  footer a {
    color: #555;
    text-decoration: none;    /* 下線を消す */
    font-size: 0.85rem;
    letter-spacing: 0.2em;    /* 文字間隔を広げる */
    text-transform: uppercase;/* 大文字（INSTAGRAM）に統一 */
    padding: 10px 20px;
    border: 1px solid #ddd;   /* 細い枠線で囲むボタン風デザイン */
    border-radius: 30px;      /* 丸みをつける */
    transition: all 0.3s ease;
    display: inline-block;
  }

  footer a:hover {
    color: #000;
    border-color: #999;
    background-color: #fff;
  }
  .insta-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    font-size: 1.4rem;           /* アイコンの大きさ */
    color: #444;                 /* アイコンの色 */
    border: 1px solid #ddd;      /* 丸い枠線 */
    border-radius: 50%;          /* 完全な丸形にする */
    text-decoration: none;
    transition: all 0.3s ease;
  }

  .insta-icon:hover {
    color: #e1306c;              /* ホバー時にインスタカラーに変化 */
    border-color: #e1306c;
    transform: translateY(-2px); /* ほんのり上に浮き上がる効果 */
  }
 
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<h1>OSUZU</h1>

<p style="text-align:center;">
Photography Portfolio
</p>

<div class="gallery">
  <img src="photo1.jpg" alt="Photo 1">
  <img src="photo2.jpg" alt="Photo 2">
  <img src="photo3.jpg" alt="Photo 3">
  <img src="photo4.jpg" alt="Photo 4">
  <img src="photo5.jpg" alt="Photo 5">
  <img src="photo6.jpg" alt="Photo 6">
</div>
    
<footer>
  <p>
    <a href="https://www.instagram.com/osuzu0103" target="_blank" rel="noopener noreferrer" class="insta-icon" aria-label="Instagram">
      <i class="fa-brands fa-instagram"></i>
    </a>
  </p>
</footer>

</body>
</html>
