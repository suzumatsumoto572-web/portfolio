<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SUZU Portfolio</title>

<style>
body{
    font-family: Arial,sans-serif;
    background:white;
    color:black;
    margin:40px;
}

h1{
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:8px;
}

footer{
    text-align:center;
    margin-top:50px;
}
    .gallery img {
  width: 100%;
  border-radius: 8px;
  transition: transform 0.3s ease, opacity 0.3s ease; /* アニメーションを滑らかにする設定 */
}

.gallery img:hover {
  transform: scale(1.03); /* マウスを乗せると少し拡大 */
  opacity: 0.9;            /* ほんのり透明にする */
}
</style>

</head>

<body>

<h1>OSUZU</h1>

<p style="text-align:center;">
Photography Portfolio
</p>

<div class="gallery">
  <img src="photo1.jpg" alt="Photo 1">
  <img src="photo2.jpg" alt="Photo 2">
  <img src="photo3.jpg" alt="Photo 3">
  <img src="photo4.jpg" alt="Photo 4">
  <img src="photo5.jpg" alt="Photo 5">
  <img src="photo6.jpg" alt="Photo 6">
</div>
    
<footer>
  <p>
    <a href="https://www.instagram.com/osuzu0103/?hl=ja">Instagram</a>
  </p>
</footer>

</body>
</html>
