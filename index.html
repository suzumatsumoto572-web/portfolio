<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SUZU Portfolio</title>

<style>
    
.gallery {
  display: flex;             /* 写真を横一列に並べる */
  overflow-x: auto;          /* はみ出た分を横スクロール可能に */
  scroll-snap-type: x mandatory; /* スクロール時にピタッと写真中央で止まる */
  gap: 16px;                 /* 写真同士の間隔 */
  padding: 20px 0;
  -webkit-overflow-scrolling: touch; /* スマホでのスクロールを滑らかに */
}

/* スクロールバーのデザインをシンプルに（必要に応じて） */
.gallery::-webkit-scrollbar {
  height: 8px;
}
.gallery::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 4px;
}

/* 写真1枚ずつの設定 */
.gallery img {
  flex: 0 0 80%;             /* 画面幅の80%サイズで表示（左右に次の写真が見える） */
  max-width: 500px;          /* PCで見ても大きくなりすぎない制限 */
  scroll-snap-align: center; /* スクリーン中央にフィット */
  border-radius: 12px;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.gallery img:hover {
  transform: scale(1.02);
}
</style>

</head>

<body>

<h1>OSUZU</h1>

<p style="text-align:center;">
Photography Portfolio
</p>

<div class="gallery">
  <img src="photo1.jpg" alt="Photo 1">
  <img src="photo2.jpg" alt="Photo 2">
  <img src="photo3.jpg" alt="Photo 3">
  <img src="photo4.jpg" alt="Photo 4">
  <img src="photo5.jpg" alt="Photo 5">
  <img src="photo6.jpg" alt="Photo 6">
</div>
    
<footer>
  <p>
    <a href="https://www.instagram.com/osuzu0103/?hl=ja">Instagram</a>
  </p>
</footer>

</body>
</html>
